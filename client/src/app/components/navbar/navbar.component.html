<nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold" routerLink="/">
      <i class="bi bi-shop me-2"></i>ShopSphere
    </a>
    
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent" aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    
    <div class="collapse navbar-collapse" id="navbarContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/shop" routerLinkActive="active">Shop</a>
        </li>
      </ul>
      
      <form class="d-flex me-3" role="search">
        <div class="input-group">
          <input class="form-control" type="search" placeholder="Search products..." aria-label="Search">
          <button class="btn btn-light" type="submit">Search</button>
        </div>
      </form>
      
      <ul class="navbar-nav mb-2 mb-lg-0">
        <li class="nav-item me-2">
          <a class="nav-link" routerLink="/cart" routerLinkActive="active">
            Cart
            <span class="badge bg-warning text-dark rounded-pill" *ngIf="cartItemCount > 0">{{ cartItemCount }}</span>
          </a>
        </li>
        
        <!-- Not Logged In -->
        <ng-container *ngIf="!isLoggedIn">
          <li class="nav-item">
            <a class="nav-link" routerLink="/login" routerLinkActive="active">Login</a>
          </li>
          <li class="nav-item">
            <a class="btn btn-outline-light ms-lg-2" routerLink="/register">Sign Up</a>
          </li>
        </ng-container>

        <!-- Logged In -->
        <ng-container *ngIf="isLoggedIn">
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
              Hi, {{ userName.split(' ')[0] }}
            </a>
            <ul class="dropdown-menu dropdown-menu-end shadow">
              <li><a class="dropdown-item" routerLink="/profile">Profile</a></li>
              <li><a class="dropdown-item" routerLink="/orders">Orders</a></li>
              <li *ngIf="isAdmin">
                <hr class="dropdown-divider">
              </li>
              <li *ngIf="isAdmin"><a class="dropdown-item text-primary" routerLink="/admin/dashboard">Admin Dashboard</a></li>
              <li>
                <hr class="dropdown-divider">
              </li>
              <li><a class="dropdown-item text-danger" href="javascript:void(0)" (click)="logout()">Logout</a></li>
            </ul>
          </li>
        </ng-container>
      </ul>
    </div>
  </div>
</nav>
