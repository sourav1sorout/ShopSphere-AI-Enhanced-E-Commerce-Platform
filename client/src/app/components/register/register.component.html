<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow border-0 rounded-4">
        <div class="card-body p-5">
          <div class="text-center mb-4">
            <h2 class="fw-bold text-primary">Create Account</h2>
            <p class="text-muted">Join ShopSphere to start shopping smartly.</p>
          </div>

          <div class="alert alert-danger" *ngIf="errorMessage">{{ errorMessage }}</div>

          <form (ngSubmit)="onSubmit()" #registerForm="ngForm">
            <div class="mb-3">
              <label class="form-label fw-semibold">Full Name</label>
              <input type="text" class="form-control form-control-lg" name="name" [(ngModel)]="userData.name" required minlength="3" placeholder="John Doe">
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Email address</label>
              <input type="email" class="form-control form-control-lg" name="email" [(ngModel)]="userData.email" required email placeholder="name@example.com">
            </div>
            
            <div class="mb-3">
              <label class="form-label fw-semibold">Password</label>
              <input type="password" class="form-control form-control-lg" name="password" [(ngModel)]="userData.password" required minlength="6" placeholder="Create password">
            </div>

            <div class="mb-4">
              <label class="form-label fw-semibold">Confirm Password</label>
              <input type="password" class="form-control form-control-lg" name="confirmPassword" [(ngModel)]="userData.confirmPassword" required placeholder="Confirm password">
            </div>
            
            <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold" [disabled]="!registerForm.form.valid || loading">
              <span *ngIf="loading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
              Sign Up
            </button>
          </form>

          <div class="text-center mt-4">
            <p class="mb-0 text-muted">Already have an account? <a routerLink="/login" class="fw-bold text-decoration-none">Login</a></p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
