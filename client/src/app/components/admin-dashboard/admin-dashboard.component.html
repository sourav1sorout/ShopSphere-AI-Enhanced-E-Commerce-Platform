<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold">Admin Dashboard</h2>
    <button class="btn btn-primary"><i class="bi bi-plus-lg me-2"></i>Add Product</button>
  </div>

  <div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border text-primary" role="status"></div>
  </div>

  <div class="row g-4" *ngIf="!loading && stats">
    <!-- Stat Cards -->
    <div class="col-md-4">
      <div class="card shadow-sm border-0 bg-primary text-white h-100">
        <div class="card-body p-4 d-flex align-items-center">
          <div class="display-4 me-4"><i class="bi bi-people"></i></div>
          <div>
            <h6 class="text-white-50 fw-bold text-uppercase mb-1">Total Users</h6>
            <h2 class="fw-bold mb-0">{{ stats.users }}</h2>
          </div>
        </div>
      </div>
    </div>
    
    <div class="col-md-4">
      <div class="card shadow-sm border-0 bg-success text-white h-100">
        <div class="card-body p-4 d-flex align-items-center">
          <div class="display-4 me-4"><i class="bi bi-box-seam"></i></div>
          <div>
            <h6 class="text-white-50 fw-bold text-uppercase mb-1">Total Products</h6>
            <h2 class="fw-bold mb-0">{{ stats.products }}</h2>
          </div>
        </div>
      </div>
    </div>
    
    <div class="col-md-4">
      <div class="card shadow-sm border-0 bg-info text-white h-100">
        <div class="card-body p-4 d-flex align-items-center">
          <div class="display-4 me-4"><i class="bi bi-cart-check"></i></div>
          <div>
            <h6 class="text-white-50 fw-bold text-uppercase mb-1">Total Orders</h6>
            <h2 class="fw-bold mb-0">{{ stats.orders }}</h2>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <div class="row mt-5" *ngIf="!loading">
    <div class="col-12 text-center text-muted">
      <p>This is a simplified dashboard for the college project. In a real-world app, you'd have tables here for managing products, users, and orders.</p>
    </div>
  </div>
</div>
