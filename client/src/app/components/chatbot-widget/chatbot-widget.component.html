<!-- Chat Button -->
<button class="btn btn-primary rounded-circle shadow-lg chat-toggle-btn" (click)="toggleChat()">
  <i class="bi" [ngClass]="isOpen ? 'bi-x-lg' : 'bi-chat-dots-fill'" style="font-size: 1.5rem;"></i>
</button>

<!-- Chat Window -->
<div class="card shadow-lg chat-window border-0 rounded-4" *ngIf="isOpen">
  <div class="card-header bg-primary text-white rounded-top-4 d-flex justify-content-between align-items-center p-3">
    <div class="d-flex align-items-center">
      <i class="bi bi-robot fs-4 me-2"></i>
      <div>
        <h6 class="mb-0 fw-bold">ShopSphere AI</h6>
        <small class="text-white-50" style="font-size: 0.75rem;">Online</small>
      </div>
    </div>
    <button class="btn-close btn-close-white" (click)="toggleChat()"></button>
  </div>
  
  <div class="card-body p-3 chat-body bg-light" #chatBody>
    <div *ngFor="let msg of messages" class="mb-3 d-flex" [ngClass]="msg.sender === 'user' ? 'justify-content-end' : 'justify-content-start'">
      
      <div *ngIf="msg.sender === 'bot'" class="me-2 text-primary">
        <i class="bi bi-robot fs-4"></i>
      </div>

      <div class="chat-bubble p-3 rounded-4 shadow-sm"
           [ngClass]="msg.sender === 'user' ? 'bg-primary text-white border-bottom-0 rounded-bottom-0 rounded-start-4' : 'bg-white text-dark border-bottom-0 rounded-bottom-0 rounded-end-4'"
           style="max-width: 80%;">
        
        <ng-container *ngIf="!msg.isLink">
          {{ msg.text }}
        </ng-container>
        
        <ng-container *ngIf="msg.isLink">
          <a [routerLink]="msg.linkUrl" (click)="toggleChat()" class="fw-bold text-decoration-none">
            {{ msg.text }} <i class="bi bi-arrow-right-short"></i>
          </a>
        </ng-container>
        
      </div>
    </div>

    <div *ngIf="loading" class="mb-3 d-flex justify-content-start">
      <div class="me-2 text-primary"><i class="bi bi-robot fs-4"></i></div>
      <div class="chat-bubble p-3 rounded-4 shadow-sm bg-white text-muted">
        <div class="typing-indicator">
          <span>.</span><span>.</span><span>.</span>
        </div>
      </div>
    </div>
  </div>
  
  <div class="card-footer bg-white border-top-0 p-3 rounded-bottom-4">
    <form (ngSubmit)="sendMessage()" class="input-group">
      <input type="text" class="form-control border-secondary bg-light rounded-start-pill" placeholder="Type a message..." [(ngModel)]="newMessage" name="newMessage" autocomplete="off">
      <button class="btn btn-primary rounded-end-pill px-3" type="submit" [disabled]="!newMessage.trim() || loading">
        <i class="bi bi-send-fill"></i>
      </button>
    </form>
  </div>
</div>
